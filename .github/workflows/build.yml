name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Linux (CMake)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: build
        run: cmake --build build -j$(nproc)
      - name: test
        run: ./test.sh || true
