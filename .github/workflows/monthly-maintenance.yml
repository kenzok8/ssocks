name: monthly-maintenance

on:
  workflow_dispatch:
  schedule:
    - cron: '45 3 1 * *'

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake make gcc g++ curl netcat-openbsd

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Run tests
        run: bash ./test.sh

      - name: Audit stale artifacts
        run: |
          set -euo pipefail
          ! find . -type d \( -name .idea -o -name .vs \) | grep .
          ! find . -type f \( -name '*.o' -o -name '*.obj' -o -name '*.exe' \) | grep .
